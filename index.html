<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Life Journey - Final Edition</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        /* Ambient Stars & Petals Background */
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 3D Bubble Button */
        #bubble-btn {
            position: relative; z-index: 10;
            padding: 20px 45px; 
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 225, 255, 0.5);
            border-radius: 100px; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 225, 255, 0.3);
            transition: 0.5s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #bubble-btn:hover {
            transform: scale(1.1) rotateX(15deg);
            box-shadow: 0 0 40px rgba(0, 225, 255, 0.6);
            background: rgba(0, 225, 255, 0.1);
        }

        /* Overlay */
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 100; justify-content: center; align-items: center;
            flex-direction: column; overflow: hidden;
        }

        /* Neon Countdown */
        #countdown {
            font-size: clamp(6rem, 25vw, 15rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #00e1ff;
            z-index: 102;
            animation: zoomPulse 1s infinite alternate;
        }

        @keyframes zoomPulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* 3D Floating Texts */
        .side-text {
            position: absolute;
            z-index: 110;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 225, 255, 0.8), 0 0 30px rgba(0, 225, 255, 0.4);
            animation: textFloat 3s infinite ease-in-out;
            display: none;
            font-size: clamp(1.5rem, 6vw, 3.5rem);
            text-align: center;
            width: 100%;
        }

        #top-text { top: 10%; }
        #bottom-text { bottom: 10%; }

        @keyframes textFloat {
            0%, 100% { transform: translateY(0) rotateX(10deg); filter: brightness(1); }
            50% { transform: translateY(-10px) rotateX(-10deg); filter: brightness(1.5); }
        }

        /* Final Image Animation */
        #image-wrapper {
            display: none;
            position: relative;
            z-index: 105;
            width: 85%; height: 60%;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        #final-vision {
            max-width: 100%; max-height: 100%;
            border-radius: 15px;
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            animation: revealFinal 2.5s ease-out forwards, float3D 6s infinite ease-in-out 2.5s;
        }

        @keyframes revealFinal {
            0% { opacity: 0; transform: scale(0.5) translateZ(-400px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); }
        }

        @keyframes float3D {
            0%, 100% { transform: rotateY(-10deg) rotateX(5deg); }
            50% { transform: rotateY(10deg) rotateX(-5deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <button id="bubble-btn" onclick="startJourney()">Click to go Previous Life</button>

    <div id="overlay">
        <div id="top-text" class="side-text">Mota Panda</div>
        
        <div id="countdown"></div>
        
        <div id="image-wrapper">
            <img id="final-vision" src="https://i.ibb.co/XrBTyWLG/20260320-054147-COLLAGE.jpg" alt="Vision">
        </div>

        <div id="bottom-text" class="side-text">Bajar Bhutto</div>

        <audio id="bg-audio">
            <source src="https://files.catbox.moe/mlc9gv.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let showPetals = false;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2,
                    type: 'star'
                });
            }
        }

        function createPetals() {
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height,
                    size: Math.random() * 6 + 4,
                    speed: Math.random() * 2 + 1,
                    angle: Math.random() * 360,
                    spin: Math.random() * 3 - 1.5,
                    type: 'petal',
                    color: `hsl(${Math.random() * 30 + 330}, 100%, 80%)`
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                if(p.type === 'star') {
                    ctx.fillStyle = "white";
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    p.y += p.speed;
                    if(p.y > canvas.height) p.y = 0;
                } else if(p.type === 'petal' && showPetals) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.ellipse(0, 0, p.size, p.size/2, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    p.y += p.speed;
                    p.x += Math.sin(p.y / 40);
                    p.angle += p.spin;
                    if(p.y > canvas.height) p.y = -20;
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        draw();

        function startJourney() {
            const btn = document.getElementById('bubble-btn');
            const overlay = document.getElementById('overlay');
            const countdown = document.getElementById('countdown');
            const wrapper = document.getElementById('image-wrapper');
            const topT = document.getElementById('top-text');
            const botT = document.getElementById('bottom-text');
            const music = document.getElementById('bg-audio');

            btn.classList.add('hidden');
            overlay.style.display = 'flex';

            let count = 3;
            countdown.innerText = count;

            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    countdown.innerText = count;
                } else {
                    clearInterval(timer);
                    countdown.style.display = 'none';
                    
                    // Show Everything with Animation
                    wrapper.style.display = 'flex';
                    topT.style.display = 'block';
                    botT.style.display = 'block';
                    showPetals = true;
                    createPetals();
                    music.play().catch(e => console.log("Play blocked", e));
                }
            }, 1000);
        }
    </script>
</body>
</html>
